[project]
name = "veritas-sdk"
version = "0.1.0"
description = "Python client for the Veritas KYC/AML API"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["veritas_sdk"]

[tool.hatch.build.targets.sdist]
include = ["veritas_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
